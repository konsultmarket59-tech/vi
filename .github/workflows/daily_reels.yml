name: Reels — ежедневная генерация

on:
  schedule:
    # 09:00 по Москве (UTC+3) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate reels
        env:
          YANDEX_DISK_TOKEN: ${{ secrets.YANDEX_DISK_TOKEN }}
          YANDEX_DISK_FOLDER: ${{ secrets.YANDEX_DISK_FOLDER }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_reels.py
