name: Reels — ежедневная генерация

on:
  schedule:
    # 09:00 по Москве (UTC+3) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download fallback fonts (Cyrillic-capable)
        run: |
          mkdir -p fonts
          # Headline — Bebas Neue (free, Cyrillic support).
          if [ ! -f fonts/BebasNeuePro-Bold.ttf ] && [ ! -f fonts/BebasNeue-Regular.ttf ]; then
            curl -fsSL -o fonts/BebasNeue-Regular.ttf \
              https://github.com/google/fonts/raw/main/ofl/bebasneue/BebasNeue-Regular.ttf
          fi
          # Accent — Dancing Script (free, Cyrillic support) as Martina Script fallback.
          if [ ! -f fonts/MartinaScript.ttf ] && [ ! -f fonts/DancingScript-Bold.ttf ]; then
            curl -fsSL -o fonts/DancingScript-Bold.ttf \
              https://github.com/google/fonts/raw/main/ofl/dancingscript/static/DancingScript-Bold.ttf
          fi
          ls -la fonts

      - name: Generate reels
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON_REELS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_REELS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_REELS_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_REELS_FOLDER_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_reels.py
