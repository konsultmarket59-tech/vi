name: Болдино LIFE — ежедневные рилзы

on:
  schedule:
    # 10:00 по Москве (UTC+3) = 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate-boldino-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate Boldino LIFE reels
        env:
          LLM_API_KEY:                   ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:                  ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:                     ${{ secrets.LLM_MODEL }}
          YANDEX_DISK_TOKEN:             ${{ secrets.YANDEX_DISK_TOKEN }}
          YANDEX_DISK_BOLDINO_SOURCE:    ${{ secrets.YANDEX_DISK_BOLDINO_SOURCE }}
          YANDEX_DISK_BOLDINO_OUTPUT:    ${{ secrets.YANDEX_DISK_BOLDINO_OUTPUT }}
        run: python generate_reels_boldino.py
