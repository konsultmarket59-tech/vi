name: Ежемесячные акты

on:
  schedule:
    # 1-е число каждого месяца в 07:00 UTC = 10:00 МСК
    - cron: '0 7 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Период YYYY-MM (по умолчанию — прошлый месяц)'
        required: false
        default: ''
      dry_run:
        description: 'Пробный запуск (не записывать файлы)'
        type: boolean
        required: false
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice libreoffice-l10n-ru --no-install-recommends

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Определить период
        id: period
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "month=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "month=$(date -d 'last month' '+%Y-%m')" >> $GITHUB_OUTPUT
          fi

      - name: Генерация актов
        env:
          YANDEX_DISK_TOKEN: ${{ secrets.YANDEX_DISK_TOKEN }}
          YANDEX_DISK_ACCOUNTING_FOLDER: ${{ secrets.YANDEX_DISK_ACCOUNTING_FOLDER }}
          YANDEX_DISK_STATS_PUBLIC_KEY: ${{ secrets.YANDEX_DISK_STATS_PUBLIC_KEY }}
        run: |
          ARGS="--month=${{ steps.period.outputs.month }} --generate"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python accounting/run_accounting.py $ARGS 2>&1 | tee /tmp/acts_output.txt

      - name: Создать GitHub Issue с результатами
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        env:
          PERIOD: ${{ steps.period.outputs.month }}
          ACCOUNTING_FOLDER: ${{ secrets.YANDEX_DISK_ACCOUNTING_FOLDER }}
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/acts_output.txt', 'utf8');
            const period = process.env.PERIOD;
            const folder = process.env.ACCOUNTING_FOLDER || 'Бухгалтерия';

            const body = `## Акты за ${period} готовы к проверке

            \`\`\`
            ${output}
            \`\`\`

            ### Чеклист
            - [ ] Открыть PDF-акты на Яндекс.Диске в папке \`${folder}/\`
            - [ ] Проверить суммы и список публикаций
            - [ ] Проверить реквизиты сторон
            - [ ] Обновить \`act_counters\` в \`accounting/config/clients.json\` после подписания

            Закройте Issue после проверки.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📄 Акты за ${period} — требуется проверка`,
              body: body,
              labels: [],
            });
