.cc-note{background:#fffbea;border:1.5px solid #f0c040;border-radius:8px;padding:10px 14px;font-size:.8rem;color:#7a5a00;margin-top:12px}

.cc-pitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:52px;cursor:pointer}
.cc-pcirc{width:28px;height:28px;border-radius:50%;background:#d8dde8;color:#6b7a99;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;transition:all .2s}

// ── HELPERS ─────────────────────────────────────────────────────
var $ = function(id){return document.getElementById(id);};
function fmt(n){return Math.round(n).toLocaleString('ru-RU')+' ₽';}
function fmtN(n){return Math.round(n).toLocaleString('ru-RU');}
function gv(id){var e=$(id);return e?e.value:'';}
function radio(nm){var e=document.querySelector('#cc-root input[name="'+nm+'"]:checked');return e?e.value:null;}
function chk(id){var e=$(id);return e&&e.checked;}

// ── HTML BUILDERS ────────────────────────────────────────────────
function rcards(nm,opts){
  var h='<div class="cc-rcards">';
  opts.forEach(function(o,i){
    h+='<label class="cc-rcard'+(i===0?' sel':'')+'" onclick="ccSelR(\''+nm+'\',\''+o.v+'\',this)">'+
      '<input type="radio" name="'+nm+'" value="'+o.v+'"'+(i===0?' checked':'')+'>'+
      '<div class="ri">'+o.icon+'</div>'+
      '<div class="rt">'+o.t+'</div>'+
      (o.d?'<div class="rd">'+o.d+'</div>':'')+
      '</label>';
  });
  return h+'</div>';
}
function tgl(id,title,desc,price,checked){
  var c=checked?'chk':'';
  return '<label class="cc-toggle '+c+'" id="tgl-'+id+'" onclick="ccTgl(\''+id+'\',this)">'+
    '<input type="checkbox" id="cb-'+id+'"'+(checked?' checked':'')+'>'+
    '<div class="cc-tbox"><svg class="cc-tbox-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div><div class="cc-ti-title">'+title+'</div><div class="cc-ti-desc">'+desc+'</div></div>'+
    '<div class="cc-tprice">'+price+'</div></label>';
}
function fg(label,inp){return '<div class="cc-fg"><label>'+label+'</label>'+inp+'</div>';}
function sel(id,opts,onch){
  var h='<select id="'+id+'"'+(onch?' onchange="'+onch+'"':'')+' style="width:100%">';
  opts.forEach(function(o){h+='<option value="'+o.v+'"'+(o.sel?' selected':'')+'>'+o.t+'</option>';});
  return h+'</select>';
}

// ── PROGRESS ─────────────────────────────────────────────────────
var LABELS=['Объект','Фундамент','Стены','Перекрытия','Кровля','Доп.','Результат'];
function renderProgress(){
  var h='';
  for(var i=1;i<=7;i++){
    var cls=S.step===i?'active':S.step>i?'done':'';
    h+='<div class="cc-pitem '+cls+'" onclick="ccGo('+i+')">'+
      '<div class="cc-pcirc">'+(S.step>i?'✓':i)+'</div>'+
      '<div class="cc-plbl">'+LABELS[i-1]+'</div></div>';
    if(i<7)h+='<div class="cc-pcon'+(S.step>i?' done':'')+'"></div>';
  }
  $('cc-progress').innerHTML=h;
}

// ── NAVIGATION ───────────────────────────────────────────────────
var PAGES=[null,page1,page2,page3,page4,page5,page6,null];
function ccGo(n){
  if(n<1||n>7)return;
  S.step=n;
  renderProgress();
  if(n===7){ccCalc();return;}
  $('cc-pages').innerHTML=PAGES[n]();
  // restore upload state
  if(n===1&&S.file){
    var r=$('cc-uprev');var nm=$('cc-upname');
    if(r&&nm){nm.textContent=S.file.name;r.style.display='flex';}
  }
  $('cc-root').scrollIntoView({behavior:'smooth',block:'start'});
}
window.ccNext=function(){ccGo(S.step+1);};
window.ccPrev=function(){ccGo(S.step-1);};
window.ccReset=function(){ccGo(1);};

// ── RADIO & TOGGLE ────────────────────────────────────────────────
window.ccSelR=function(nm,val,el){
  document.querySelectorAll('#cc-root input[name="'+nm+'"]').forEach(function(r){
    var p=r.closest('.cc-rcard');if(p)p.classList.remove('sel');
  });
  el.classList.add('sel');
  el.querySelector('input').checked=true;
};
window.ccTgl=function(key,el){
  var cb=el.querySelector('input');cb.checked=!cb.checked;
  el.classList.toggle('chk',cb.checked);
};

// ── FILE UPLOAD ───────────────────────────────────────────────────
window.ccUpload=function(inp){
  var f=inp.files[0];if(!f)return;
  S.file=f;
  $('cc-upname').textContent=f.name+' ('+Math.round(f.size/1024)+' КБ)';
  $('cc-uprev').style.display='flex';
  var rd=new FileReader();
  rd.onload=function(e){S.fileData=e.target.result;};
  rd.readAsDataURL(f);
};
window.ccRemFile=function(){
  S.file=null;S.fileData=null;
  var fi=$('cc-file');if(fi)fi.value='';
  var r=$('cc-uprev');if(r)r.style.display='none';
};

// ── CALCULATION ───────────────────────────────────────────────────
window.ccCalc=function(){
  var fp   =parseFloat(gv('footprint'))||150;
  var ta   =parseFloat(gv('total-area'))||120;
  var fl   =parseInt(gv('floors'))||1;
  var pitch=parseInt((document.getElementById('roof-pitch')||{value:27}).value)||27;

  var fType=radio('foundation')||'piles_strip';
  var wpMat=gv('waterproof-mat')||'bitumen';
  var fIns =gv('found-ins')||'xps_50';
  var bSlab=gv('base-slab')||'concrete_plates';
  var bkBase=gv('brick-base')||'none';

  var wMat=radio('wall-mat')||'gb_d400_400';
  var pMat=gv('part-mat')||'brick_120';
  var fIns2=gv('facade-ins')||'mineral_50';
  var fCld=gv('facade-clad')||'fiber_cement';
  var armB=gv('arm-belts')||'full';

  var iSlab=radio('inter-slab')||'concrete_plates';
  var aSlab=radio('attic-slab')||'concrete_plates';

  var rType=gv('roof-type')||'gable';
  var rCov=radio('roof-cov')||'metal_tile';
  var rIns=gv('roof-ins')||'none';
  var drain=gv('drainage')||'metal';

  var hDrv=chk('cb-driveway'),hWell=chk('cb-well'),hWW=chk('cb-water-well');
  var hSep=chk('cb-septic'),hSup=chk('cb-supervision'),hBng=chk('cb-bungalow');

  // roof area
  var rA=fp*R.roof.pitch(pitch)*(R.roof.typM[rType]||1.0);

  // === foundation ===
  var fBase=fp*R.found.base*(R.found.types[fType]||1)*(R.found.wpMod[wpMat]||1)*(R.found.insMod[fIns]||1);
  var fSubs={prep:fBase*R.found.prep,piles:fBase*R.found.piles,strip:fBase*R.found.strip,wp:fBase*R.found.wp,sup:fBase*R.found.sup};
  var fMat=fBase*R.found.matR,fWork=fBase*R.found.workR;

  // === base slab ===
  var bsTotal=fp*R.baseSlab.base*(R.baseSlab.types[bSlab]||0)*(R.baseSlab.bkMod[bkBase]||1);
  var bsMat=bsTotal*R.baseSlab.matR,bsWork=bsTotal*R.baseSlab.workR;

  // === walls ===
  var wBase=ta*R.walls.base*(R.walls.mats[wMat]||1)*(R.walls.partM[pMat]||1)*(R.walls.insM[fIns2]||1)*(R.walls.cladM[fCld]||1)*(R.walls.beltM[armB]||1);
  var wSubs={ext:wBase*R.walls.extW,int:wBase*R.walls.intW,lin:wBase*R.walls.lin,part:wBase*R.walls.part,arm:wBase*R.walls.arm,clad:wBase*R.walls.clad,sup:wBase*R.walls.sup};
  var wMat2=wBase*R.walls.matR,wWork=wBase*R.walls.workR;

  // === inter slab ===
  var isCnt=Math.max(0,fl-1);
  var isTotal=fp*R.interSlab.base*(R.interSlab.types[iSlab]||1)*isCnt;
  var isMat=isTotal*R.interSlab.matR,isWork=isTotal*R.interSlab.workR;

  // === attic slab ===
  var asTotal=fp*R.atticSlab.base*(R.atticSlab.types[aSlab]||1);
  var asMat=asTotal*R.atticSlab.matR,asWork=asTotal*R.atticSlab.workR;

  // === roof ===
  var trussBase=rA*(R.roof.truss+R.roof.wp)*(R.roof.insM[rIns]||1);
  var covBase=rA*(R.roof.cov[rCov]||R.roof.cov.metal_tile)*(R.roof.drainM[drain]||1);
  var roofTotal=trussBase+covBase;
  var roofMat=trussBase*R.roof.matRT+covBase*R.roof.matRC;
  var roofWork=trussBase*R.roof.workRT+covBase*R.roof.workRC;

  // === additional ===
  var addItems=[];
  function mayAdd(key,name,desc){
    var active={driveway:hDrv,well:hWell,waterWell:hWW,septic:hSep,supervision:hSup,bungalow:hBng}[key];
    if(!active)return;
    var r=R.add[key];
    addItems.push({name:name,desc:desc,total:r.cost,mat:r.cost*r.mR,work:r.cost*r.wR});
  }
  mayAdd('driveway','Организация проезда на участок','Труба, щебень, трактор-экскаватор');
  mayAdd('well','Водоразборная скважина','Бурение, обсадка ДУ127, насос, монтаж');
  mayAdd('waterWell','Колодец водораспределения','КС-1.0, труба ПНД, греющий кабель');
  mayAdd('septic','Система канализации — септик','Колодцы КС-1.5, гидроизоляция, дренаж');
  mayAdd('supervision','Технический и геодезический надзор','Контроль на всех этапах');
  mayAdd('bungalow','Бытовой городок для рабочих','Бытовка, санузел, электроэнергия');
  var addTotal=addItems.reduce(function(s,i){return s+i.total;},0);
  var addMat=addItems.reduce(function(s,i){return s+i.mat;},0);
  var addWork=addItems.reduce(function(s,i){return s+i.work;},0);

  var total=fBase+bsTotal+wBase+isTotal+asTotal+roofTotal+addTotal;
  var mat=fMat+bsMat+wMat2+isMat+asMat+roofMat+addMat;
  var work=fWork+bsWork+wWork+isWork+asWork+roofWork+addWork;

  // build stages
  var stages=[];
  var sn=1;
  stages.push({num:sn++,name:'Фундамент',total:fBase,mat:fMat,work:fWork,sub:[
    {name:'Подготовительные работы (геодезия, основание, опалубка, арматурный каркас)',mat:fSubs.prep*R.found.matR,work:fSubs.prep*R.found.workR,total:fSubs.prep},
    {name:'Буронабивные сваи (бурение, арматурный каркас, бетонирование)',mat:fSubs.piles*R.found.matR,work:fSubs.piles*R.found.workR,total:fSubs.piles},
    {name:'Ростверк / лента фундамента (опалубка, арматура, бетонирование)',mat:fSubs.strip*R.found.matR,work:fSubs.strip*R.found.workR,total:fSubs.strip},
    {name:'Вертикальная гидроизоляция и утепление фундамента',mat:fSubs.wp*R.found.matR,work:fSubs.wp*R.found.workR,total:fSubs.wp},
    {name:'Технический надзор и организация строительства',mat:0,work:fSubs.sup,total:fSubs.sup}
  ]});
  if(bsTotal>0)stages.push({num:sn++,name:'Перекрытие цокольное',total:bsTotal,mat:bsMat,work:bsWork,sub:[
    {name:'Плиты перекрытия ЖБ / монолит (доставка, разгрузка, монтаж краном)',mat:bsMat*.75,work:bsWork*.75,total:bsTotal*.75},
    {name:'Термоизоляция, анкеровка перекрытий, омоноличивание швов',mat:bsMat*.25,work:bsWork*.25,total:bsTotal*.25}
  ]});
  stages.push({num:sn++,name:'Несущие стены и перегородки'+(fl>1?' ('+fl+' эт.)':''),total:wBase,mat:wMat2,work:wWork,sub:[
    {name:'Несущие внешние стены (кладка, крепёж, перемычки)',mat:(wSubs.ext+wSubs.lin)*R.walls.matR,work:(wSubs.ext+wSubs.lin)*R.walls.workR,total:wSubs.ext+wSubs.lin},
    {name:'Несущие внутренние стены (кладка, перемычки)',mat:wSubs.int*R.walls.matR,work:wSubs.int*R.walls.workR,total:wSubs.int},
    {name:'Перегородки (кладка, крепёж)',mat:wSubs.part*R.walls.matR,work:wSubs.part*R.walls.workR,total:wSubs.part},
    {name:'Армирующие и опорные монолитные пояса (арматура, опалубка, бетонирование)',mat:wSubs.arm*R.walls.matR,work:wSubs.arm*R.walls.workR,total:wSubs.arm},
    {name:'Утепление и облицовка фасада',mat:wSubs.clad*R.walls.matR,work:wSubs.clad*R.walls.workR,total:wSubs.clad},
    {name:'Технический надзор и организация',mat:0,work:wSubs.sup,total:wSubs.sup}
  ]});
  if(isTotal>0)stages.push({num:sn++,name:'Перекрытие межэтажное ('+isCnt+' шт.)',total:isTotal,mat:isMat,work:isWork,sub:[
    {name:'ЖБ плиты перекрытия ПК/ПБ (доставка, разгрузка, монтаж краном)',mat:isMat*.72,work:isWork*.72,total:isTotal*.72},
    {name:'Термоизоляция, анкеровка, омоноличивание швов, монолитные участки',mat:isMat*.28,work:isWork*.28,total:isTotal*.28}
  ]});
  stages.push({num:sn++,name:'Чердачное перекрытие',total:asTotal,mat:asMat,work:asWork,sub:[
    {name:'Плиты перекрытия / деревянные балки (монтаж)',mat:asMat*.70,work:asWork*.70,total:asTotal*.70},
    {name:'Термоизоляция, пароизоляция, анкеровка',mat:asMat*.30,work:asWork*.30,total:asTotal*.30}
  ]});
  var tM=trussBase*R.roof.matRT,tW=trussBase*R.roof.workRT,cM=covBase*R.roof.matRC,cW=covBase*R.roof.workRC;
  var covNames={metal_tile:'металлочерепица',profnastil:'профнастил',flexible:'гибкая черепица',seam:'фальцевая кровля',ceramic:'керамическая черепица'};
  stages.push({num:sn++,name:'Кровля',total:roofTotal,mat:roofMat,work:roofWork,sub:[
    {name:'Стропильная система (мауэрлат, конёк, стропила, огне/биозащита)',mat:tM*.78,work:tW*.78,total:trussBase*.78},
    {name:'Гидроизоляция, обрешётка и контробрешётка',mat:tM*.22,work:tW*.22,total:trussBase*.22},
    {name:'Кровельное покрытие — '+(covNames[rCov]||rCov)+', с доп. элементами',mat:cM,work:cW,total:covBase}
  ]});
  if(addTotal>0)stages.push({num:sn++,name:'Дополнительные работы',total:addTotal,mat:addMat,work:addWork,sub:addItems.map(function(i){return{name:i.name+' — '+i.desc,mat:i.mat,work:i.work,total:i.total};})});

  // payments
  var pays=[];var pn=1;
  stages.forEach(function(st){
    if(st.total<=0)return;
    if(st.name.startsWith('Фундамент')){
      pays.push({label:'Платёж №'+pn++,stage:'Фундамент — заказ материалов, подготовка',amount:st.mat*.65+st.work*.3});
      pays.push({label:'Платёж №'+pn++,stage:'Фундамент — бетонирование и гидроизоляция',amount:st.mat*.35+st.work*.7});
    } else if(st.name.includes('стены')||st.name.includes('Стены')){
      pays.push({label:'Платёж №'+pn++,stage:st.name+' — материалы, 1-я половина',amount:st.mat*.55+st.work*.35});
      pays.push({label:'Платёж №'+pn++,stage:st.name+' — завершение',amount:st.mat*.45+st.work*.65});
    } else {
      pays.push({label:'Платёж №'+pn++,stage:st.name,amount:st.total});
    }
  });

  S.lastRes={total:total,mat:mat,work:work,totalArea:ta,roofArea:rA,floors:fl,stages:stages,pays:pays};

  S.step=7;
  renderProgress();
  $('cc-pages').innerHTML=page7(S.lastRes);
  $('cc-root').scrollIntoView({behavior:'smooth',block:'start'});
};

// ── PDF ──────────────────────────────────────────────────────────
window.ccPDF=function(){
  if(!window.jspdf){alert('PDF-генератор ещё загружается, попробуйте через несколько секунд.');return;}
  var btn=$('cc-pdfbtn');if(btn)btn.disabled=true;
  setTimeout(function(){
    try{
      var res=S.lastRes;
      var jsPDF=window.jspdf.jsPDF;
      var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      var W=210,ml=15,mr=15,cW=W-ml-mr;
      var y=0;
      var cP=[26,58,92],cA=[232,160,32],cG=[107,122,153],cL=[244,246,250];

      function newPage(){
        doc.addPage();y=15;
        doc.setFillColor.apply(doc,cP);doc.rect(0,0,W,10,'F');
        doc.setFontSize(7);doc.setTextColor(255,255,255);
        doc.text('СК «ИндивиДом» — Предварительный расчёт стоимости строительства',ml,6.5);
        doc.text('стр.'+doc.internal.getNumberOfPages(),W-mr,6.5,{align:'right'});
        y=18;
      }
      function chk2(n){if(y+n>277)newPage();}

      var oName=gv('obj-name')||'Жилой дом';
      var oAddr=gv('obj-address')||'';
      var fp=parseFloat(gv('footprint'))||150;
      var ta=parseFloat(gv('total-area'))||120;
      var fl=parseInt(gv('floors'))||1;

      // Cover
      doc.setFillColor.apply(doc,cP);doc.rect(0,0,W,55,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(20);doc.setFont(undefined,'bold');
      doc.text('СК «ИндивиДом»',ml,21);
      doc.setFontSize(9);doc.setFont(undefined,'normal');
      doc.text('г. Пермь, ул. Связистов, 24  •  +7 (342) 204-24-40  •  sk-individom.ru',ml,29);
      doc.setFontSize(15);doc.setFont(undefined,'bold');
      doc.text('ПРЕДВАРИТЕЛЬНЫЙ РАСЧЁТ',ml,41);
      doc.setFontSize(10);doc.setFont(undefined,'normal');
      doc.text('стоимости строительства жилого дома «под крышу»',ml,49);
      y=68;

      // Object info
      doc.setFillColor.apply(doc,cL);doc.roundedRect(ml,y,cW,52,3,3,'F');
      doc.setTextColor.apply(doc,cP);doc.setFontSize(11);doc.setFont(undefined,'bold');
      doc.text('Параметры объекта',ml+5,y+9);
      var prms=[['Объект:',oName],['Адрес:',oAddr||'не указан'],['Площадь застройки:',fp+' м²'],['Общая площадь:',ta+' м²'],['Этажность:',fl+(fl===1?' этаж':fl<5?' этажа':' этажей')],['Площадь кровли:',Math.round(res.roofArea)+' м²']];
      doc.setFontSize(9);
      prms.forEach(function(p,i){var row=Math.floor(i/2),col=i%2;var x=ml+5+col*(cW/2);var yy=y+17+row*11;doc.setFont(undefined,'bold');doc.setTextColor.apply(doc,cG);doc.text(p[0],x,yy);doc.setFont(undefined,'normal');doc.setTextColor.apply(doc,cP);doc.text(p[1],x+50,yy);});
      y+=58;

      // Total
      doc.setFillColor.apply(doc,cP);doc.roundedRect(ml,y,cW,34,3,3,'F');
      doc.setTextColor(200,210,230);doc.setFontSize(8);doc.setFont(undefined,'normal');
      doc.text('ИТОГОВАЯ СТОИМОСТЬ СТРОИТЕЛЬСТВА «ПОД КРЫШУ»',ml+cW/2,y+8,{align:'center'});
      doc.setTextColor(255,255,255);doc.setFontSize(24);doc.setFont(undefined,'bold');
      doc.text(fmt(res.total),ml+cW/2,y+23,{align:'center'});
      y+=40;

      // Mat/Work split
      var hw=(cW-6)/2;
      doc.setFillColor(240,244,252);doc.roundedRect(ml,y,hw,20,2,2,'F');
      doc.setFillColor(245,240,252);doc.roundedRect(ml+hw+6,y,hw,20,2,2,'F');
      doc.setFontSize(7);doc.setFont(undefined,'normal');doc.setTextColor.apply(doc,cG);
      doc.text('Материалы с доставкой',ml+hw/2,y+6,{align:'center'});
      doc.text('Строительно-монтажные работы',ml+hw+6+hw/2,y+6,{align:'center'});
      doc.setFontSize(10);doc.setFont(undefined,'bold');
      doc.setTextColor.apply(doc,cP);doc.text(fmt(res.mat),ml+hw/2,y+15,{align:'center'});
      doc.setTextColor(124,77,186);doc.text(fmt(res.work),ml+hw+6+hw/2,y+15,{align:'center'});
      y+=26;

      doc.setFontSize(7.5);doc.setFont(undefined,'normal');doc.setTextColor.apply(doc,cG);
      doc.text('Стоимость 1 м² общей площади: '+fmtN(Math.round(res.total/res.totalArea))+' ₽/м²',ml+cW/2,y,{align:'center'});
      y+=18;

      // Page 2: stages
      newPage();
      doc.setFontSize(13);doc.setFont(undefined,'bold');doc.setTextColor.apply(doc,cP);
      doc.text('ДЕТАЛИЗАЦИЯ ПО ЭТАПАМ СТРОИТЕЛЬСТВА',ml,y);y+=8;

      res.stages.forEach(function(st){
        if(st.total<=0)return;
        chk2(28);
        doc.setFillColor.apply(doc,cP);doc.roundedRect(ml,y,cW,8,2,2,'F');
        doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont(undefined,'bold');
        doc.text('ЭТАП '+st.num+': '+st.name.toUpperCase(),ml+3,y+5.5);
        doc.text(fmt(st.total),W-mr-2,y+5.5,{align:'right'});
        y+=10;
        doc.autoTable({startY:y,margin:{left:ml,right:mr},
          head:[['Наименование работ','Материалы, ₽','Работы, ₽','Итого, ₽']],
          body:[].concat(st.sub.map(function(s){return[s.name,s.mat>0?fmtN(Math.round(s.mat)):'—',s.work>0?fmtN(Math.round(s.work)):'—',fmtN(Math.round(s.total))];}),
            [[{content:'ИТОГО по этапу',styles:{fontStyle:'bold',fillColor:cL}},{content:fmtN(Math.round(st.mat)),styles:{fontStyle:'bold',fillColor:cL,textColor:[35,85,160]}},{content:fmtN(Math.round(st.work)),styles:{fontStyle:'bold',fillColor:cL,textColor:[124,77,186]}},{content:fmtN(Math.round(st.total)),styles:{fontStyle:'bold',fillColor:cL}}]]),
          styles:{fontSize:7.5,cellPadding:2.5},
          headStyles:{fillColor:[35,85,160],textColor:255,fontStyle:'bold',fontSize:7.5},
          columnStyles:{0:{cellWidth:'auto'},1:{halign:'right',cellWidth:32},2:{halign:'right',cellWidth:32},3:{halign:'right',cellWidth:32}},
          alternateRowStyles:{fillColor:[248,249,252]}});
        y=doc.lastAutoTable.finalY+7;
      });

      // Totals
      chk2(40);
      doc.setFillColor.apply(doc,cA);doc.roundedRect(ml,y,cW,8,2,2,'F');
      doc.setTextColor.apply(doc,cP);doc.setFontSize(9);doc.setFont(undefined,'bold');
      doc.text('ИТОГО ПОЛНАЯ СТОИМОСТЬ СТРОИТЕЛЬСТВА',ml+3,y+5.5);
      doc.text(fmt(res.total),W-mr-2,y+5.5,{align:'right'});
      y+=10;
      doc.autoTable({startY:y,margin:{left:ml,right:mr},
        body:[['Материалы с доставкой и разгрузкой, услуги спецтехники',fmtN(Math.round(res.mat))+' ₽'],['Строительно-монтажные работы',fmtN(Math.round(res.work))+' ₽'],['ИТОГО',fmtN(Math.round(res.total))+' ₽']],
        styles:{fontSize:8.5},columnStyles:{0:{cellWidth:'auto'},1:{halign:'right',cellWidth:48,fontStyle:'bold'}},bodyStyles:{fillColor:cL}});
      y=doc.lastAutoTable.finalY+10;

      // Payments
      chk2(55);
      doc.setFillColor.apply(doc,cP);doc.roundedRect(ml,y,cW,8,2,2,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont(undefined,'bold');
      doc.text('ГРАФИК ПЛАТЕЖЕЙ',ml+3,y+5.5);y+=10;
      doc.autoTable({startY:y,margin:{left:ml,right:mr},
        head:[['Платёж','Этап строительства','Сумма, ₽']],
        body:res.pays.map(function(p){return[p.label,p.stage,fmtN(Math.round(p.amount))+' ₽'];}),
        styles:{fontSize:7.5,cellPadding:2.5},headStyles:{fillColor:cP,textColor:255,fontStyle:'bold'},
        columnStyles:{0:{cellWidth:26,fontStyle:'bold'},1:{cellWidth:'auto'},2:{halign:'right',cellWidth:38,fontStyle:'bold'}},
        alternateRowStyles:{fillColor:[248,249,252]}});
      y=doc.lastAutoTable.finalY+8;

      // Notes
      chk2(44);
      doc.setFillColor(255,251,234);doc.roundedRect(ml,y,cW,36,2,2,'F');
      doc.setDrawColor(240,192,64);doc.roundedRect(ml,y,cW,36,2,2,'S');
      doc.setTextColor(122,90,0);doc.setFontSize(7.5);doc.setFont(undefined,'bold');
      doc.text('Важные примечания:',ml+4,y+6);doc.setFont(undefined,'normal');
      var notes=['* Предварительный расчёт — стоимость возведения дома «под крышу» по ГОСТам и СНиПам РФ.',
        '* Точная стоимость определяется после разработки рабочей документации (АР+КР).',
        '* Возможна корректировка объёмов по факту (геология, рельеф, погода).',
        '* Стоимость внутренней отделки и инженерных систем в доме не включена.',
        '* Срок строительства: '+(res.floors===1?'5–6':res.floors===2?'7–9':'10–14')+' месяцев.'];
      notes.forEach(function(n,i){doc.text(n,ml+4,y+12+i*5,{maxWidth:cW-8});});
      y+=42;

      // Signature
      chk2(25);
      doc.setTextColor.apply(doc,cG);doc.setFontSize(7.5);doc.setFont(undefined,'normal');
      var dt=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
      doc.text('Технический директор СК «ИндивиДом»: ___________________  Тихонов Г.Н.',ml,y+8);
      doc.text('Дата: '+dt,W-mr,y+8,{align:'right'});

      // Embed project image if uploaded
      if(S.fileData&&S.file&&/\.(jpg|jpeg|png)$/i.test(S.file.name)){
        doc.addPage();y=20;

        doc.text('ПРИЛОЖЕНИЕ: ЭСКИЗНЫЙ ПРОЕКТ',ml,y);y+=10;

          var fmt2=/\.png$/i.test(S.file.name)?'PNG':'JPEG';

      var fname='Расчет_'+(oName||'Дом').replace(/\s+/g,'_')+'_'+new Date().toLocaleDateString('ru-RU').replace(/\./g,'-')+'.pdf';
      doc.save(fname);
    }catch(e){console.error(e);alert('Ошибка PDF: '+e.message);}
    var btn2=$('cc-pdfbtn');if(btn2)btn2.disabled=false;
  },150);
};
